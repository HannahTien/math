<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國中公式秘笈 | AI 助教版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-hover:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">

    <nav class="p-5 flex justify-between items-center border-b border-slate-800 glass-card sticky top-0 z-10">
        <div class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
            <i class="fa-solid fa-square-root-variable mr-2"></i>FormulaX
        </div>
        <div class="space-x-6 hidden md:block">
            <a href="#" class="hover:text-blue-400 transition">數學</a>
            <a href="#" class="hover:text-indigo-400 transition">理化</a>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto mt-16 px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-6">看不懂題目嗎？交給 AI 幫你找公式</h1>
        <p class="text-slate-400 mb-8">貼上你的國中題目，右下角的 AI 助教會引導你找出破題關鍵。</p>
    </header>

    <main class="max-w-6xl mx-auto mt-20 px-6 pb-20">
        <h2 class="text-2xl font-bold mb-8 border-l-4 border-blue-500 pl-4">近期熱門公式</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="glass-card rounded-2xl p-6 glow-hover transition duration-300 cursor-pointer">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-blue-900 text-blue-300 text-xs font-bold px-3 py-1 rounded-full">理化 - 力學</span>
                </div>
                <h3 class="text-xl font-bold mb-2">牛頓第二運動定律</h3>
                <p class="text-slate-400 text-sm mb-4">用來計算物體受力後產生的加速度。</p>
                <div class="bg-slate-800 p-3 rounded-lg text-center font-mono text-lg text-blue-400">
                    F = m × a
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        <div id="ai-chatbox" class="hidden w-80 bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl mb-4 overflow-hidden flex flex-col h-96">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 font-bold flex justify-between items-center text-white">
                <span><i class="fa-solid fa-robot mr-2"></i>AI 解題助教</span>
                <button onclick="toggleChat()" class="hover:text-slate-300"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div id="chat-window" class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-900/50">
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center flex-shrink-0 text-white"><i class="fa-solid fa-robot"></i></div>
                    <div class="bg-slate-700 p-3 rounded-xl rounded-tl-none text-sm text-slate-200">
                        你好！我是你的 AI 解題助教。遇到想不通的題目或是忘記公式，隨時都可以問我！
                    </div>
                </div>
            </div>
            
            <div class="p-3 border-t border-slate-700 bg-slate-800 flex gap-2">
                <input type="text" id="chat-input" placeholder="輸入題目..." class="flex-1 bg-slate-900 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                <button onclick="sendMessage()" class="bg-blue-600 px-3 py-2 rounded-lg text-sm font-bold hover:bg-blue-500 text-white"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <button onclick="toggleChat()" class="bg-gradient-to-r from-blue-500 to-indigo-600 w-16 h-16 rounded-full shadow-[0_0_20px_rgba(59,130,246,0.5)] flex items-center justify-center text-2xl text-white hover:scale-110 transition duration-300">
            <i class="fa-solid fa-robot"></i>
        </button>
    </div>

    <script>
        function toggleChat() {
            const chatbox = document.getElementById('ai-chatbox');
            chatbox.classList.toggle('hidden');
        }

        async function sendMessage() {
            const inputField = document.getElementById('chat-input');
            const message = inputField.value.trim();
            if (!message) return;

            const chatWindow = document.getElementById('chat-window');

            chatWindow.innerHTML += `
                <div class="flex gap-3 justify-end">
                    <div class="bg-slate-600 p-3 rounded-xl rounded-tr-none text-sm text-white">
                        ${message}
                    </div>
                </div>
            `;
            inputField.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            const loadingId = 'loading-' + Date.now();
            chatWindow.innerHTML += `
                <div id="${loadingId}" class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-robot"></i></div>
                    <div class="bg-slate-700 p-3 rounded-xl rounded-tl-none text-sm text-slate-400 italic">
                        AI 思考中...
                    </div>
                </div>
            `;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();

                document.getElementById(loadingId).remove();
                const formattedReply = data.reply.replace(/\n/g, '<br>');

                chatWindow.innerHTML += `
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-robot"></i></div>
                        <div class="bg-slate-700 p-3 rounded-xl rounded-tl-none text-sm text-slate-200">
                            ${formattedReply}
                        </div>
                    </div>
                `;
                chatWindow.scrollTop = chatWindow.scrollHeight;

            } catch (error) {
                document.getElementById(loadingId).remove();
                alert("連線發生錯誤！");
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
