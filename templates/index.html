<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormulaX | 公式秘笈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0A0E17',
                        cardbg: '#141A29',
                        highlight: '#4D94FF',
                        mathcolor: '#2563EB',   /* 數學的藍色 */
                        physcolor: '#9333EA',   /* 理化的紫色 */
                        menubg: '#374151'       /* 漢堡選單的灰色 */
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A0E17; color: #F1F5F9; }
        .glass-card {
            background-color: #141A29;
            border: 1px solid rgba(77, 148, 255, 0.15);
            transition: all 0.2s ease-in-out;
        }
        .glass-card:hover {
            border-color: rgba(77, 148, 255, 0.6);
            transform: translateY(-3px);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4D94FF; border-radius: 10px; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col relative overflow-x-hidden">

    <nav class="p-4 flex items-center bg-darkbg border-b border-gray-800 sticky top-0 z-40">
        <button onclick="toggleSidebar()" class="text-2xl text-gray-400 hover:text-white transition mr-4">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div onclick="switchView('view-home')" class="cursor-pointer flex items-center group">
            <img id="custom-logo" src="/static/logo.png" alt="Logo" class="w-10 h-10 mr-2 group-hover:opacity-80">
            <span class="text-2xl font-bold tracking-wider text-white group-hover:text-highlight transition">FormulaX</span>
        </div>
    </nav>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-menubg transform -translate-x-full transition-transform duration-300 z-50 shadow-2xl overflow-y-auto">
        <div class="p-4 flex justify-end border-b border-gray-600">
            <button onclick="toggleSidebar()" class="text-gray-300 hover:text-white text-2xl">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="flex flex-col p-4">
            <button onclick="switchView('view-home')" class="text-left px-4 py-3 rounded-lg hover:bg-gray-600 text-white transition font-bold text-lg mb-2"><i class="fa-solid fa-house w-6 mr-2"></i> 首頁</button>
            
            <div class="mb-2">
                <button onclick="switchView('view-math')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-gray-600 text-white transition font-bold text-lg"><i class="fa-solid fa-calculator w-6 mr-2"></i> 數學</button>
                <div class="flex flex-col pl-12 space-y-2 mt-1">
                    <button onclick="switchToGradeDetail('數學', '一年級'); toggleSidebar()" class="text-left text-gray-300 hover:text-highlight transition">一年級</button>
                    <button onclick="switchToGradeDetail('數學', '二年級'); toggleSidebar()" class="text-left text-gray-300 hover:text-highlight transition">二年級</button>
                    <button onclick="switchToGradeDetail('數學', '三年級'); toggleSidebar()" class="text-left text-gray-300 hover:text-highlight transition">三年級</button>
                </div>
            </div>

            <div class="mb-2">
                <button onclick="switchView('view-physics')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-gray-600 text-white transition font-bold text-lg"><i class="fa-solid fa-flask w-6 mr-2"></i> 理化</button>
                <div class="flex flex-col pl-12 space-y-2 mt-1">
                    <button onclick="switchToGradeDetail('理化', '一年級'); toggleSidebar()" class="text-left text-gray-300 hover:text-highlight transition">一年級</button>
                    <button onclick="switchToGradeDetail('理化', '二年級'); toggleSidebar()" class="text-left text-gray-300 hover:text-highlight transition">二年級</button>
                    <button onclick="switchToGradeDetail('理化', '三年級'); toggleSidebar()" class="text-left text-gray-300 hover:text-highlight transition">三年級</button>
                </div>
            </div>

            <button onclick="switchView('view-favorites')" class="text-left px-4 py-3 mt-4 rounded-lg hover:bg-gray-600 text-yellow-400 transition font-bold text-lg"><i class="fa-solid fa-star w-6 mr-2"></i> 我的收藏</button>
        </div>
    </div>
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-60 z-40 hidden"></div>

    <main class="flex-1 p-6 max-w-5xl mx-auto w-full">
        
        <div id="view-home" class="view-section block">
            <div class="text-center my-10">
                <h1 class="text-4xl md:text-5xl font-bold mb-4 tracking-wide text-white">要做預習或複習嗎？</h1>
                <h1 class="text-4xl md:text-5xl font-bold mb-8 tracking-wide text-white">來這裡找你要的公式吧！</h1>
            </div>
            
            <h2 class="text-2xl font-bold mb-4 border-l-4 border-highlight pl-3 text-white">常用公式</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <div class="glass-card rounded-xl p-5 cursor-pointer relative formula-card" 
                     data-title="牛頓第二運動定律" data-formula="F = m × a" data-tag="理化 - 二年級" data-desc="用來計算物體受力後產生的加速度。F 是力，m 是質量，a 是加速度。"
                     onclick="openModal(this)">
                    <button class="absolute top-4 right-4 text-gray-600 hover:text-yellow-500 fav-btn" onclick="event.stopPropagation(); toggleFavorite(this)"><i class="fa-solid fa-star text-2xl"></i></button>
                    <div class="text-sm text-white font-bold px-3 py-1 bg-physcolor rounded-full inline-block mb-3 shadow">理化 - 二年級</div>
                    <h3 class="text-2xl font-bold mb-3 text-gray-100">牛頓第二運動定律</h3>
                    <div class="text-highlight text-xl font-mono text-center mt-4 bg-gray-900 bg-opacity-50 py-3 rounded tracking-wider">F = m × a</div>
                </div>
                
                <div class="glass-card rounded-xl p-5 cursor-pointer relative formula-card" 
                     data-title="畢氏定理" data-formula="a² + b² = c²" data-tag="數學 - 二年級" data-desc="直角三角形中，兩股的平方和等於斜邊的平方。"
                     onclick="openModal(this)">
                    <button class="absolute top-4 right-4 text-gray-600 hover:text-yellow-500 fav-btn" onclick="event.stopPropagation(); toggleFavorite(this)"><i class="fa-solid fa-star text-2xl"></i></button>
                    <div class="text-sm text-white font-bold px-3 py-1 bg-mathcolor rounded-full inline-block mb-3 shadow">數學 - 二年級</div>
                    <h3 class="text-2xl font-bold mb-3 text-gray-100">畢氏定理</h3>
                    <div class="text-highlight text-xl font-mono text-center mt-4 bg-gray-900 bg-opacity-50 py-3 rounded tracking-wider">a² + b² = c²</div>
                </div>
            </div>
        </div>

        <div id="view-math" class="view-section hidden">
            <h1 class="text-4xl font-bold mb-10 text-center tracking-widest text-white">數學</h1>
            
            <div class="mb-10">
                <div class="flex justify-between items-end mb-4 border-b border-gray-800 pb-2">
                    <h2 class="text-2xl font-bold text-gray-200">一年級</h2>
                    <button onclick="switchToGradeDetail('數學', '一年級')" class="text-lg text-highlight hover:text-blue-300 font-bold">更多 <i class="fa-solid fa-angle-right"></i></button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    <div class="glass-card rounded-xl p-5 cursor-pointer relative formula-card" 
                         data-title="一元一次方程式" data-formula="ax + b = 0" data-tag="數學 - 一年級" data-desc="求出未知數 x 的基本方程式。"
                         onclick="openModal(this)">
                        <button class="absolute top-4 right-4 text-gray-600 hover:text-yellow-500 fav-btn" onclick="event.stopPropagation(); toggleFavorite(this)"><i class="fa-solid fa-star text-2xl"></i></button>
                        <div class="text-sm text-white font-bold px-3 py-1 bg-mathcolor rounded-full inline-block mb-3 shadow">數學 - 一年級</div>
                        <h3 class="text-2xl font-bold mb-3 text-gray-100">一元一次方程式</h3>
                        <div class="text-highlight text-xl font-mono text-center mt-4 bg-gray-900 py-3 rounded tracking-wider">ax + b = 0</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-physics" class="view-section hidden">
            <h1 class="text-4xl font-bold mb-10 text-center tracking-widest text-white">理化</h1>
            <div class="mb-10">
                <div class="flex justify-between items-end mb-4 border-b border-gray-800 pb-2">
                    <h2 class="text-2xl font-bold text-gray-200">二年級</h2>
                    <button onclick="switchToGradeDetail('理化', '二年級')" class="text-lg text-highlight hover:text-blue-300 font-bold">更多 <i class="fa-solid fa-angle-right"></i></button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    <div class="glass-card rounded-xl p-5 cursor-pointer relative formula-card" 
                         data-title="密度公式" data-formula="D = M / V" data-tag="理化 - 二年級" data-desc="物體的緊密程度。質量除以體積。"
                         onclick="openModal(this)">
                        <button class="absolute top-4 right-4 text-gray-600 hover:text-yellow-500 fav-btn" onclick="event.stopPropagation(); toggleFavorite(this)"><i class="fa-solid fa-star text-2xl"></i></button>
                        <div class="text-sm text-white font-bold px-3 py-1 bg-physcolor rounded-full inline-block mb-3 shadow">理化 - 二年級</div>
                        <h3 class="text-2xl font-bold mb-3 text-gray-100">密度</h3>
                        <div class="text-highlight text-xl font-mono text-center mt-4 bg-gray-900 py-3 rounded tracking-wider">D = M / V</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-grade-detail" class="view-section hidden">
            <button onclick="switchView('view-home')" class="text-highlight hover:text-white mb-6 text-lg transition"><i class="fa-solid fa-arrow-left mr-2"></i>返回</button>
            <h1 id="grade-detail-title" class="text-3xl font-bold mb-8 border-l-4 border-highlight pl-4 text-white">科目 - 年級</h1>
            <p class="text-gray-500 text-lg">這裡將動態顯示該年級的所有公式卡片...</p>
        </div>

        <div id="view-favorites" class="view-section hidden">
            <h1 class="text-4xl font-bold mb-10 text-center text-yellow-500 tracking-widest"><i class="fa-solid fa-star mr-2"></i>我的收藏</h1>
            <div id="favorites-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            </div>
        </div>

    </main>

    <div id="detail-modal" class="fixed inset-0 bg-black bg-opacity-80 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-cardbg border border-highlight w-full max-w-md rounded-2xl p-6 relative transform scale-95 transition-transform duration-200 shadow-[0_0_30px_rgba(77,148,255,0.2)]" id="modal-content">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button>
            <div id="modal-tag" class="text-sm text-white font-bold px-3 py-1 rounded-full inline-block mb-4 shadow">標籤</div>
            <h2 id="modal-title" class="text-3xl font-bold mb-4 text-white">公式名稱</h2>
            <div id="modal-formula" class="bg-gray-900 text-highlight text-2xl font-mono text-center py-6 rounded-xl mb-6 border border-gray-700 tracking-wider">
                Formula
            </div>
            <p id="modal-desc" class="text-gray-300 text-lg leading-relaxed">解說內容</p>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        <div id="ai-chatbox" class="hidden w-80 bg-cardbg border border-highlight rounded-2xl shadow-2xl mb-4 overflow-hidden flex flex-col h-96">
            <div class="bg-gray-900 border-b border-gray-800 p-4 font-bold flex justify-between items-center text-white">
                <span class="text-highlight"><i class="fa-solid fa-robot mr-2"></i>AI 解題助教</span>
                <button onclick="toggleChat()" class="hover:text-gray-400"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div id="chat-window" class="flex-1 p-4 overflow-y-auto space-y-4 bg-darkbg">
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-highlight flex items-center justify-center flex-shrink-0 text-white"><i class="fa-solid fa-robot"></i></div>
                    <div class="bg-gray-800 p-3 rounded-xl rounded-tl-none text-sm text-gray-200">
                        你好！我是你的 AI 解題助教。遇到想不通的題目或是忘記公式，隨時都可以問我！
                    </div>
                </div>
            </div>
            
            <div class="p-3 border-t border-gray-800 bg-cardbg flex gap-2">
                <input type="text" id="chat-input" placeholder="輸入題目..." class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-highlight">
                <button onclick="sendMessage()" class="bg-highlight px-3 py-2 rounded-lg text-sm font-bold hover:bg-blue-400 text-white transition"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <button onclick="toggleChat()" class="bg-highlight w-14 h-14 rounded-full shadow-[0_0_15px_rgba(77,148,255,0.4)] flex items-center justify-center text-2xl text-white hover:scale-110 transition duration-300">
            <i class="fa-solid fa-robot"></i>
        </button>
    </div>

    <script>
        let favorites = JSON.parse(localStorage.getItem('formulaFavorites')) || [];

        window.onload = () => {
            updateAllStarIcons();
            renderFavorites();
        };

        // 取得標籤對應的顏色
        function getTagColorClass(tag) {
            if(tag.includes('數學')) return 'bg-mathcolor';
            if(tag.includes('理化')) return 'bg-physcolor';
            return 'bg-gray-600';
        }

        function toggleFavorite(btn) {
            const card = btn.closest('.formula-card');
            const title = card.dataset.title;
            const formula = card.dataset.formula;
            const tag = card.dataset.tag;
            const desc = card.dataset.desc;

            const index = favorites.findIndex(f => f.title === title);

            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push({ title, formula, tag, desc });
            }

            localStorage.setItem('formulaFavorites', JSON.stringify(favorites));
            updateAllStarIcons();
            renderFavorites();
        }

        function updateAllStarIcons() {
            document.querySelectorAll('.formula-card').forEach(card => {
                const title = card.dataset.title;
                const icon = card.querySelector('.fav-btn i');
                if(!icon) return;
                
                if (favorites.some(f => f.title === title)) {
                    icon.classList.remove('text-gray-600');
                    icon.classList.add('text-yellow-500');
                } else {
                    icon.classList.remove('text-yellow-500');
                    icon.classList.add('text-gray-600');
                }
            });
        }

        function renderFavorites() {
            const container = document.getElementById('favorites-container');
            container.innerHTML = ''; 
            
            if(favorites.length === 0) {
                container.innerHTML = '<p class="text-gray-500 col-span-full text-center mt-10 text-lg">目前還沒有收藏任何公式喔！</p>';
                return;
            }

            favorites.forEach(fav => {
                const tagColor = getTagColorClass(fav.tag);
                container.innerHTML += `
                    <div class="glass-card rounded-xl p-5 cursor-pointer relative formula-card" 
                         data-title="${fav.title}" data-formula="${fav.formula}" data-tag="${fav.tag}" data-desc="${fav.desc}"
                         onclick="openModal(this)">
                        <button class="absolute top-4 right-4 text-yellow-500 hover:text-gray-600 fav-btn" onclick="event.stopPropagation(); toggleFavorite(this)"><i class="fa-solid fa-star text-2xl"></i></button>
                        <div class="text-sm text-white font-bold px-3 py-1 ${tagColor} rounded-full inline-block mb-3 shadow">${fav.tag}</div>
                        <h3 class="text-2xl font-bold mb-3 text-gray-100">${fav.title}</h3>
                        <div class="text-highlight text-xl font-mono text-center mt-4 bg-gray-900 bg-opacity-50 py-3 rounded tracking-wider">${fav.formula}</div>
                    </div>
                `;
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('block');
            });
            document.getElementById(viewId).classList.remove('hidden');
            document.getElementById(viewId).classList.add('block');
            
            if (!document.getElementById('sidebar').classList.contains('-translate-x-full')) {
                toggleSidebar();
            }
            window.scrollTo(0, 0);
        }

        function switchToGradeDetail(subject, grade) {
            document.getElementById('grade-detail-title').innerText = `${subject} - ${grade}`;
            switchView('view-grade-detail');
        }

        function openModal(card) {
            const tag = card.dataset.tag;
            document.getElementById('modal-title').innerText = card.dataset.title;
            document.getElementById('modal-formula').innerText = card.dataset.formula;
            document.getElementById('modal-desc').innerText = card.dataset.desc;
            
            const modalTag = document.getElementById('modal-tag');
            modalTag.innerText = tag;
            modalTag.className = `text-sm text-white font-bold px-3 py-1 rounded-full inline-block mb-4 shadow ${getTagColorClass(tag)}`;
            
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.remove('scale-95'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        function toggleChat() {
            document.getElementById('ai-chatbox').classList.toggle('hidden');
        }

        async function sendMessage() {
            const inputField = document.getElementById('chat-input');
            const message = inputField.value.trim();
            if (!message) return;

            const chatWindow = document.getElementById('chat-window');

            chatWindow.innerHTML += `
                <div class="flex gap-3 justify-end">
                    <div class="bg-gray-700 p-3 rounded-xl rounded-tr-none text-sm text-white">
                        ${message}
                    </div>
                </div>
            `;
            inputField.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            const loadingId = 'loading-' + Date.now();
            chatWindow.innerHTML += `
                <div id="${loadingId}" class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-highlight text-white flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-robot"></i></div>
                    <div class="bg-gray-800 p-3 rounded-xl rounded-tl-none text-sm text-gray-400 italic">
                        AI 思考中...
                    </div>
                </div>
            `;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                if (!response.ok) {
                    throw new Error("伺服器回應錯誤");
                }
                
                const data = await response.json();
                document.getElementById(loadingId).remove();
                const formattedReply = data.reply.replace(/\n/g, '<br>');

                chatWindow.innerHTML += `
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-highlight text-white flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-robot"></i></div>
                        <div class="bg-gray-800 p-3 rounded-xl rounded-tl-none text-sm text-gray-200">
                            ${formattedReply}
                        </div>
                    </div>
                `;
                chatWindow.scrollTop = chatWindow.scrollHeight;

            } catch (error) {
                document.getElementById(loadingId).remove();
                chatWindow.innerHTML += `
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-red-600 text-white flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-triangle-exclamation"></i></div>
                        <div class="bg-gray-800 p-3 rounded-xl rounded-tl-none text-sm text-red-400">
                            連線異常！請檢查 Docker 是否有讀取到 .env，或稍後再試。
                        </div>
                    </div>
                `;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
