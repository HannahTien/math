{% extends "base.html" %}

{% block content %}
<div id="view-home" class="view-section block">
    <div class="text-center my-10">
        <h1 class="text-4xl md:text-5xl font-black mb-8 tracking-wide text-white">國中公式大全</h1>
    </div>
    
    <h2 class="text-2xl font-bold mb-4 border-l-4 border-highlight pl-3 text-white">常用公式</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        
        <div class="glass-card rounded-xl p-5 cursor-pointer relative formula-card" 
             data-title="牛頓第二運動定律" data-subject="理化" data-grade="二年級" data-desc="用來計算物體受力後產生的加速度。F 是力，m 是質量，a 是加速度。"
             onclick="openModal(this)">
            <button class="absolute top-4 right-4 text-gray-600 hover:text-yellow-500 fav-btn" onclick="event.stopPropagation(); toggleFavorite(this)"><i class="fa-solid fa-star text-2xl"></i></button>
            <div class="flex gap-2 mb-3">
                <span class="font-wenkai font-light text-base text-white px-3 py-1 bg-tagPhys rounded-full shadow tracking-wider">理化</span>
                <span class="font-wenkai font-light text-base text-white px-3 py-1 bg-tagG2 rounded-full shadow tracking-wider">二年級</span>
            </div>
            <h3 class="font-wenkai font-normal text-2xl mb-3 text-gray-100 tracking-wide">牛頓第二運動定律</h3>
            <div class="text-highlight text-2xl font-math italic text-center mt-4 bg-gray-900 bg-opacity-50 py-3 rounded tracking-wider">F = m × a</div>
        </div>
        
        <div class="glass-card rounded-xl p-5 cursor-pointer relative formula-card" 
             data-title="畢氏定理" data-subject="數學" data-grade="二年級" data-desc="直角三角形中，兩股的平方和等於斜邊的平方。"
             onclick="openModal(this)">
            <button class="absolute top-4 right-4 text-gray-600 hover:text-yellow-500 fav-btn" onclick="event.stopPropagation(); toggleFavorite(this)"><i class="fa-solid fa-star text-2xl"></i></button>
            <div class="flex gap-2 mb-3">
                <span class="font-wenkai font-light text-base text-white px-3 py-1 bg-tagMath rounded-full shadow tracking-wider">數學</span>
                <span class="font-wenkai font-light text-base text-white px-3 py-1 bg-tagG2 rounded-full shadow tracking-wider">二年級</span>
            </div>
            <h3 class="font-wenkai font-normal text-2xl mb-3 text-gray-100 tracking-wide">畢氏定理</h3>
            <div class="text-highlight text-2xl font-math italic text-center mt-4 bg-gray-900 bg-opacity-50 py-3 rounded tracking-wider">a² + b² = c²</div>
        </div>

    </div>
</div>
{% endblock %}
