<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormulaX | 公式秘笈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+Mono+TC:wght@300;400&family=Noto+Serif+TC:wght@400;700;900&family=STIX+Two+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Serif TC"', 'PMingLiU', 'serif'],
                        wenkai: ['"LXGW WenKai Mono TC"', 'monospace'],
                        math: ['"STIX Two Text"', '"Noto Serif TC"', 'serif']
                    },
                    colors: {
                        darkbg: '#0A0E17',
                        cardbg: '#141A29',
                        highlight: '#4D94FF',
                        menubg: '#374151',
                        tagMath: '#2563EB',
                        tagPhys: '#9333EA',
                        tagG1: '#10B981',
                        tagG2: '#F59E0B',
                        tagG3: '#EF4444'
                    }
                }
            }
        }
    </script>
    <style>
        html, body { background-color: #0A0E17; color: #F1F5F9; font-weight: 400; }
       
        .glass-card {
            background-color: #141A29;
            border: 1px solid rgba(77, 148, 255, 0.15);
            transition: all 0.2s ease-in-out;
        }
        .glass-card:hover {
            border-color: rgba(77, 148, 255, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(77, 148, 255, 0.1);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4D94FF; border-radius: 10px; }

        #view-math .grid .formula-card:nth-child(n+4),
        #view-physics .grid .formula-card:nth-child(n+4) {
            display: none !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">

    {% include 'navbar.html' %}

    <main class="flex-1 p-6 max-w-5xl mx-auto w-full">
        {% block content %}{% endblock %}
    
        <div id="view-grade-detail" class="view-section hidden">
            <button onclick="goBackToMain()" class="text-highlight hover:text-white mb-6 text-lg transition"><i class="fa-solid fa-arrow-left mr-2"></i>返回</button>
            <h1 id="grade-detail-title" class="font-wenkai font-normal text-3xl mb-8 border-l-4 border-highlight pl-4 text-white">科目 - 年級</h1>
            
            <div id="grade-detail-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                </div>
        </div>
    </main>

    <div id="detail-modal" class="fixed inset-0 bg-black bg-opacity-80 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-cardbg border border-highlight w-full max-w-md rounded-2xl p-6 relative transform scale-95 transition-transform duration-200 shadow-[0_0_30px_rgba(77,148,255,0.2)]" id="modal-content">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button>
            <div class="flex gap-2 mb-4" id="modal-tags-container">
                <span id="modal-subject" class="font-wenkai font-light text-base text-white px-3 py-1 rounded-full shadow bg-gray-600 tracking-wider">科目</span>
                <span id="modal-grade" class="font-wenkai font-light text-base text-white px-3 py-1 rounded-full shadow bg-gray-600 tracking-wider">年級</span>
            </div>
            <h2 id="modal-title" class="font-wenkai font-normal text-3xl mb-4 text-white tracking-wide">公式名稱</h2>
            <div id="modal-formula" class="bg-gray-900 text-highlight text-3xl font-math italic text-center py-6 rounded-xl mb-6 border border-gray-700 tracking-wider flex flex-col gap-2 items-center justify-center min-h-[120px]">
                Formula
            </div>
            <p id="modal-desc" class="text-gray-300 text-lg leading-relaxed">解說內容</p>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        <div id="ai-chatbox" class="hidden w-80 bg-cardbg border border-highlight rounded-2xl shadow-2xl mb-4 overflow-hidden flex flex-col h-96">
            <div class="bg-gray-900 border-b border-gray-800 p-4 font-bold flex justify-between items-center text-white">
                <span class="text-highlight"><i class="fa-solid fa-robot mr-2"></i>AI 解題助教</span>
                <button onclick="toggleChat()" class="hover:text-gray-400"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="chat-window" class="flex-1 p-4 overflow-y-auto space-y-4 bg-darkbg">
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-highlight flex items-center justify-center flex-shrink-0 text-white"><i class="fa-solid fa-robot"></i></div>
                    <div class="bg-gray-800 p-3 rounded-xl rounded-tl-none text-sm text-gray-200">
                        你好！我是你的 AI 解題助教。遇到想不通的題目或是忘記公式，隨時都可以問我！
                    </div>
                </div>
            </div>
            <div class="p-3 border-t border-gray-800 bg-cardbg flex gap-2">
                <input type="text" id="chat-input" placeholder="輸入題目..." class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-highlight">
                <button onclick="sendMessage()" class="bg-highlight px-3 py-2 rounded-lg text-sm font-bold hover:bg-blue-400 text-white transition"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
        <button onclick="toggleChat()" class="bg-highlight w-14 h-14 rounded-full shadow-[0_0_15px_rgba(77,148,255,0.4)] flex items-center justify-center text-2xl text-white hover:scale-110 transition duration-300">
            <i class="fa-solid fa-robot"></i>
        </button>
    </div>

    <script>
        let favorites = JSON.parse(localStorage.getItem('formulaFavorites')) || [];
        let previousMainViewId = ''; 

        window.onload = () => {
            updateAllStarIcons();
            renderFavorites();
            
            const urlParams = new URLSearchParams(window.location.search);
            const subject = urlParams.get('subject');
            const grade = urlParams.get('grade');
            
            if (subject && grade) {
                setTimeout(() => {
                    switchToGradeDetail(subject, grade);
                }, 100);
            }
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if(sidebar && overlay) {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }
        }

        function getSubjectColorClass(subject) {
            if(subject === '數學') return 'bg-tagMath';
            if(subject === '理化') return 'bg-tagPhys';
            return 'bg-gray-600';
        }

        function getGradeColorClass(grade) {
            if(grade === '一年級') return 'bg-tagG1';
            if(grade === '二年級') return 'bg-tagG2';
            if(grade === '三年級') return 'bg-tagG3';
            return 'bg-gray-600';
        }

        function switchToGradeDetail(subject, grade) {
            document.getElementById('grade-detail-title').innerText = `${subject} - ${grade}`;
            const container = document.getElementById('grade-detail-container');
            if (!container) return;
            container.innerHTML = ''; 

            const sourceCards = document.querySelectorAll('.formula-card');
            let foundAny = false;
            
            sourceCards.forEach(card => {
                if (card.dataset.subject === subject && card.dataset.grade === grade) {
                    const clone = card.cloneNode(true);
                    clone.style.display = 'block';
                    clone.classList.remove('hidden');
                    container.appendChild(clone);
                    foundAny = true;
                }
            });

            if (!foundAny) {
                container.innerHTML = '<p class="text-gray-500 col-span-full text-center mt-10 text-lg">這個年級目前沒有公式卡片喔！</p>';
            }

            const currentActiveView = document.querySelector('.view-section.block');
            if (currentActiveView && currentActiveView.id !== 'view-grade-detail') {
                previousMainViewId = currentActiveView.id;
                currentActiveView.classList.remove('block');
                currentActiveView.classList.add('hidden');
            }

            const detailView = document.getElementById('view-grade-detail');
            detailView.classList.remove('hidden');
            detailView.classList.add('block');

            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        function goBackToMain() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('grade')) {
                const currentPath = window.location.pathname;
                window.location.href = currentPath; 
                return;
            }

            const detailView = document.getElementById('view-grade-detail');
            detailView.classList.remove('block');
            detailView.classList.add('hidden');

            if (previousMainViewId) {
                const prevView = document.getElementById(previousMainViewId);
                if (prevView) {
                    prevView.classList.remove('hidden');
                    prevView.classList.add('block');
                }
            }
        }

        function toggleFavorite(btn) {
            const card = btn.closest('.formula-card');
            const title = card.dataset.title;
            const formula = card.querySelector('.font-math').innerHTML;
            const subject = card.dataset.subject;
            const grade = card.dataset.grade;
            const desc = card.dataset.desc;

            const index = favorites.findIndex(f => f.title === title);
            if (index > -1) { favorites.splice(index, 1); } else { favorites.push({ title, formula, subject, grade, desc }); }
            localStorage.setItem('formulaFavorites', JSON.stringify(favorites));
            updateAllStarIcons();
            renderFavorites();
        }

        function updateAllStarIcons() {
            document.querySelectorAll('.formula-card').forEach(card => {
                const title = card.dataset.title;
                const icon = card.querySelector('.fav-btn i');
                if(!icon) return;
                if (favorites.some(f => f.title === title)) { icon.classList.remove('text-gray-600'); icon.classList.add('text-yellow-500'); } 
                else { icon.classList.remove('text-yellow-500'); icon.classList.add('text-gray-600'); }
            });
        }

        function renderFavorites() {
            const container = document.getElementById('favorites-container');
            if (!container) return;
            container.innerHTML = ''; 
            if(favorites.length === 0) { container.innerHTML = '<p class="text-gray-500 col-span-full text-center mt-10 text-lg">目前還沒有收藏任何公式喔！</p>'; return; }
            favorites.forEach(fav => {
                const subjectColor = getSubjectColorClass(fav.subject);
                const gradeColor = getGradeColorClass(fav.grade);
                container.innerHTML += `<div class="glass-card rounded-xl p-5 cursor-pointer relative formula-card" data-title="${fav.title}" data-subject="${fav.subject}" data-grade="${fav.grade}" data-desc="${fav.desc}" onclick="openModal(this)"><button class="absolute top-4 right-4 text-yellow-500 hover:text-gray-600 fav-btn" onclick="event.stopPropagation(); toggleFavorite(this)"><i class="fa-solid fa-star text-2xl"></i></button><div class="flex gap-2 mb-3"><span class="font-wenkai font-light text-base text-white px-3 py-1 ${subjectColor} rounded-full shadow tracking-wider">${fav.subject}</span><span class="font-wenkai font-light text-base text-white px-3 py-1 ${gradeColor} rounded-full shadow tracking-wider">${fav.grade}</span></div><h3 class="font-wenkai font-normal text-2xl mb-3 text-gray-100 tracking-wide">${fav.title}</h3><div class="font-math text-highlight text-2xl italic text-center mt-4 bg-gray-900 bg-opacity-50 py-3 rounded tracking-wider flex flex-col gap-1">${fav.formula}</div></div>`;
            });
        }

        function openModal(card) {
            const subject = card.dataset.subject; const grade = card.dataset.grade;
            document.getElementById('modal-title').innerText = card.dataset.title;
            document.getElementById('modal-formula').innerHTML = card.querySelector('.font-math').innerHTML;
            document.getElementById('modal-desc').innerText = card.dataset.desc;
            const modalSubject = document.getElementById('modal-subject'); const modalGrade = document.getElementById('modal-grade');
            modalSubject.innerText = subject; modalSubject.className = `font-wenkai font-light text-base text-white px-3 py-1 rounded-full shadow tracking-wider ${getSubjectColorClass(subject)}`;
            modalGrade.innerText = grade; modalGrade.className = `font-wenkai font-light text-base text-white px-3 py-1 rounded-full shadow tracking-wider ${getGradeColorClass(grade)}`;
            const modal = document.getElementById('detail-modal'); const content = document.getElementById('modal-content');
            modal.classList.remove('hidden'); setTimeout(() => content.classList.remove('scale-95'), 10);
        }
        function closeModal() { const modal = document.getElementById('detail-modal'); const content = document.getElementById('modal-content'); content.classList.add('scale-95'); setTimeout(() => modal.classList.add('hidden'), 200); }
        function toggleChat() { document.getElementById('ai-chatbox').classList.toggle('hidden'); }
        async function sendMessage() {
            const inputField = document.getElementById('chat-input'); const message = inputField.value.trim(); if (!message) return;
            inputField.disabled = true; inputField.placeholder = "AI 思考中，請稍候...";
            const chatWindow = document.getElementById('chat-window');
            chatWindow.innerHTML += `<div class="flex gap-3 justify-end"><div class="bg-gray-700 p-3 rounded-xl rounded-tr-none text-sm text-white">${message}</div></div>`;
            inputField.value = ''; chatWindow.scrollTop = chatWindow.scrollHeight;
            const loadingId = 'loading-' + Date.now();
            chatWindow.innerHTML += `<div id="${loadingId}" class="flex gap-3"><div class="w-8 h-8 rounded-full bg-highlight flex items-center justify-center flex-shrink-0 text-white"><i class="fa-solid fa-robot"></i></div><div class="bg-gray-800 p-3 rounded-xl rounded-tl-none text-sm text-gray-400 italic">AI 思考中...</div></div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
            try {
                const response = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: message }) });
                const data = await response.json(); if (!response.ok) { throw new Error(data.reply || "未知的伺服器錯誤"); }
                document.getElementById(loadingId).remove(); const formattedReply = data.reply.replace(/\n/g, '<br>');
                chatWindow.innerHTML += `<div class="flex gap-3"><div class="w-8 h-8 rounded-full bg-highlight text-white flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-robot"></i></div><div class="bg-gray-800 p-3 rounded-xl rounded-tl-none text-sm text-gray-200">${formattedReply}</div></div>`;
            } catch (error) {
                document.getElementById(loadingId).remove();
                chatWindow.innerHTML += `<div class="flex gap-3"><div class="w-8 h-8 rounded-full bg-red-600 text-white flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-triangle-exclamation"></i></div><div class="bg-gray-800 p-3 rounded-xl rounded-tl-none text-sm text-red-400"><strong>真實錯誤原因：</strong><br>${error.message}</div></div>`;
            } finally { inputField.disabled = false; inputField.placeholder = "輸入題目..."; inputField.focus(); chatWindow.scrollTop = chatWindow.scrollHeight; }
        }
        document.getElementById('chat-input').addEventListener('keypress', function (e) { if (e.key === 'Enter') { sendMessage(); } });
    </script>
</body>
</html>
